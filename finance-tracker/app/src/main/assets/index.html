<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Мои финансы</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- ============ TAB: БАЛАНС ============ -->
  <section class="screen" id="screen-balance">
    <header class="topbar">
      <div class="topbar-row">
        <h1 class="screen-title">Баланс</h1>
        <label class="display-pick">
          итог в
          <select id="displayCurrency" class="mini-select"></select>
        </label>
      </div>
    </header>

    <main class="content">
      <div class="hero">
        <div class="hero-label">Всего на всех кошельках</div>
        <div class="hero-amount" id="heroTotal">—</div>
        <div class="hero-foot">
          <span id="rateStatus" class="rate-status">Курс не загружен</span>
          <button id="refreshRates" class="rate-refresh" type="button">↻ обновить</button>
        </div>
      </div>

      <button id="shareStory" class="share-btn" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.1" fill="currentColor" stroke="none"/></svg>
        Поделиться в Stories
      </button>

      <div class="section-head">
        <span>Кошельки</span>
        <span class="hint">суммы вводите сами</span>
      </div>

      <div id="walletList" class="wallet-list"></div>

      <button id="addWallet" class="add-btn" type="button">+ Добавить кошелёк</button>

      <p class="attribution">Курсы: ExchangeRate-API · open.er-api.com</p>
    </main>
  </section>

  <!-- ============ TAB: ОПЕРАЦИИ ============ -->
  <section class="screen" id="screen-ops" hidden>
    <header class="topbar">
      <div class="topbar-row">
        <h1 class="screen-title">Операции</h1>
        <div class="month-switch">
          <button id="monthPrev" class="month-btn" type="button" aria-label="Предыдущий месяц">‹</button>
          <span id="monthLabel" class="month-label">—</span>
          <button id="monthNext" class="month-btn" type="button" aria-label="Следующий месяц">›</button>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="add-card">
        <div class="type-toggle" id="typeToggle">
          <button class="type-btn active" data-type="expense" type="button">− Расход</button>
          <button class="type-btn" data-type="income" type="button">+ Приход</button>
        </div>

        <div class="field-row">
          <label class="field grow">
            <span class="field-label">Категория</span>
            <select id="opCategory" class="select"></select>
          </label>
        </div>
        <div class="field-row">
          <label class="field grow">
            <span class="field-label">Сумма</span>
            <input id="opAmount" class="input mono" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00">
          </label>
          <label class="field">
            <span class="field-label">Валюта</span>
            <select id="opCurrency" class="select"></select>
          </label>
        </div>
        <div class="field-row">
          <label class="field grow">
            <span class="field-label" id="walletFieldLabel">Откуда (кошелёк)</span>
            <select id="opWallet" class="select"></select>
          </label>
        </div>
        <div class="field-row">
          <label class="field">
            <span class="field-label">Дата</span>
            <input id="opDate" class="input" type="date">
          </label>
          <label class="field grow">
            <span class="field-label">Заметка</span>
            <input id="opNote" class="input" type="text" maxlength="60" placeholder="необязательно">
          </label>
        </div>
        <button id="addOp" class="primary-btn" type="button">Добавить расход</button>
      </div>

      <div class="summary-card">
        <div class="stat-row">
          <div class="stat stat-in">
            <span class="stat-label">Приход</span>
            <span id="monthIncome" class="stat-amount mono">—</span>
          </div>
          <div class="stat stat-out">
            <span class="stat-label">Расход</span>
            <span id="monthExpense" class="stat-amount mono">—</span>
          </div>
        </div>
        <div class="section-sub">Расходы по категориям</div>
        <div id="catBreakdown" class="cat-breakdown"></div>
      </div>

      <div class="section-head">
        <span>Записи</span>
        <span class="hint" id="entriesCount"></span>
      </div>
      <div id="opList" class="expense-list"></div>
    </main>
  </section>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="tabbar">
    <button class="tab active" data-tab="balance" type="button">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M16 11.5h4v3h-4a1.5 1.5 0 0 1 0-3z"/><path d="M3 8.5V7a2 2 0 0 1 2-2h11"/></svg>
      <span>Баланс</span>
    </button>
    <button class="tab" data-tab="ops" type="button">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10l5-5 5 5"/><path d="M12 5v9"/><path d="M17 14l-5 5-5-5"/></svg>
      <span>Операции</span>
    </button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
